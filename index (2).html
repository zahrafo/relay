document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ign-items:center;justify-content:center;color:#fff;font-weight:700;font-size:11px;flex:none\">H<\u002Fspan>\n        <span>Horizon<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:16px\">\n      <div style=\"display:flex;align-items:center;gap:8px;font-size:12px;color:#8A8072;font-weight:600\">\n        <span>Viewing as<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:flex;background:#F1EADE;border-radius:10px;padding:3px;gap:2px\">\n        <button onclick=\"{{ roleLISA }}\" style=\"{{ roleChipLISA }}\">LISA team<\u002Fbutton>\n        <button onclick=\"{{ rolePartner }}\" style=\"{{ roleChipPartner }}\">Horizon team<\u002Fbutton>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:9px;padding-left:4px\">\n        <div style=\"width:34px;height:34px;border-radius:50%;background:{{ me.color }};display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:12.5px\">{{ me.initials }}<\u002Fdiv>\n        <div style=\"line-height:1.1\">\n          <div style=\"font-size:12.5px;font-weight:600\">{{ me.name }}<\u002Fdiv>\n          <div style=\"font-size:10.5px;color:#8A8072\">{{ me.role }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <div style=\"flex:1;display:flex;overflow:hidden\">\n\n    <!-- ===== SIDEBAR ===== -->\n    <nav style=\"flex:none;width:224px;background:#FBF6EE;border-right:1px solid #E5DBCA;padding:18px 14px;display:flex;flex-direction:column;gap:4px\">\n      <div style=\"font-size:10.5px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:#B0A492;padding:6px 10px 8px\">Workspace<\u002Fdiv>\n      <button onclick=\"{{ goIntake }}\" style=\"{{ navIntake }}\">\n        <svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M14 3v4a1 1 0 0 0 1 1h4\"><\u002Fpath><path d=\"M5 21V5a2 2 0 0 1 2-2h7l5 5v13a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2z\"><\u002Fpath><line x1=\"12\" y1=\"11\" x2=\"12\" y2=\"17\"><\u002Fline><polyline points=\"9 14 12 11 15 14\"><\u002Fpolyline><\u002Fsvg>\n        <span>Event brief<\u002Fspan>\n      <\u002Fbutton>\n      <button onclick=\"{{ goTracker }}\" style=\"{{ navTracker }}\">\n        <svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><line x1=\"8\" y1=\"6\" x2=\"21\" y2=\"6\"><\u002Fline><line x1=\"8\" y1=\"12\" x2=\"21\" y2=\"12\"><\u002Fline><line x1=\"8\" y1=\"18\" x2=\"21\" y2=\"18\"><\u002Fline><line x1=\"3\" y1=\"6\" x2=\"3.01\" y2=\"6\"><\u002Fline><line x1=\"3\" y1=\"12\" x2=\"3.01\" y2=\"12\"><\u002Fline><line x1=\"3\" y1=\"18\" x2=\"3.01\" y2=\"18\"><\u002Fline><\u002Fsvg>\n        <span>Tracker<\u002Fspan>\n        <span style=\"{{ trackerCountStyle }}\">{{ openTotal }}<\u002Fspan>\n      <\u002Fbutton>\n      <button onclick=\"{{ goBoard }}\" style=\"{{ navBoard }}\">\n        <svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2\"><\u002Fpath><circle cx=\"12\" cy=\"7\" r=\"4\"><\u002Fcircle><\u002Fsvg>\n        <span>My board<\u002Fspan>\n        <span style=\"{{ boardCountStyle }}\">{{ myOpenCount }}<\u002Fspan>\n      <\u002Fbutton>\n      <button onclick=\"{{ goTimeline }}\" style=\"{{ navTimeline }}\">\n        <svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"3\" y=\"4\" width=\"18\" height=\"18\" rx=\"2\"><\u002Frect><line x1=\"16\" y1=\"2\" x2=\"16\" y2=\"6\"><\u002Fline><line x1=\"8\" y1=\"2\" x2=\"8\" y2=\"6\"><\u002Fline><line x1=\"3\" y1=\"10\" x2=\"21\" y2=\"10\"><\u002Fline><\u002Fsvg>\n        <span>Timeline<\u002Fspan>\n      <\u002Fbutton>\n\n      <div style=\"margin-top:auto;padding:14px 12px;background:#F5EEE2;border-radius:12px;border:1px solid #E9DFCE\">\n        <div style=\"font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#B0A492;margin-bottom:9px\">Team<\u002Fdiv>\n        <sc-for list=\"{{ team }}\" as=\"p\" hint-placeholder-count=\"5\">\n          <div style=\"display:flex;align-items:center;gap:8px;padding:4px 0\">\n            <div style=\"width:24px;height:24px;border-radius:50%;background:{{ p.color }};display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:9.5px;flex:none\">{{ p.initials }}<\u002Fdiv>\n            <div style=\"min-width:0\">\n              <div style=\"font-size:11.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ p.name }}<\u002Fdiv>\n              <div style=\"font-size:9.5px;color:#9A8F7E\">{{ p.tag }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fnav>\n\n    <!-- ===== MAIN ===== -->\n    <main style=\"flex:1;overflow-y:auto;overflow-x:hidden\">\n\n      <!-- context header -->\n      <sc-if value=\"{{ showContextHeader }}\">\n        <div style=\"padding:20px 30px 0;position:sticky;top:0;background:#F1EADE;z-index:10\">\n          <div style=\"display:flex;align-items:flex-end;justify-content:space-between;gap:20px;padding-bottom:16px;border-bottom:1px solid #E2D8C8\">\n            <div>\n              <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:5px\">\n                <span style=\"font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#C0603A;background:#F5E0D6;padding:3px 9px;border-radius:999px\">{{ event.type }}<\u002Fspan>\n                <span style=\"font-size:12px;color:#8A8072;font-weight:500\">{{ event.dateLabel }} · {{ event.headcount }} people · {{ event.venue }}<\u002Fspan>\n              <\u002Fdiv>\n              <h1 style=\"margin:0;font-family:'Newsreader',serif;font-weight:500;font-size:27px;letter-spacing:-.01em;color:#2B2622\">{{ event.name }}<\u002Fh1>\n            <\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:26px;padding-bottom:2px\">\n              <div style=\"text-align:right\">\n                <div style=\"font-size:22px;font-weight:700;font-family:'Newsreader',serif;color:#C0603A;line-height:1\">{{ daysToEvent }}<\u002Fdiv>\n                <div style=\"font-size:10.5px;color:#8A8072;font-weight:600;text-transform:uppercase;letter-spacing:.05em\">days to go<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"width:1px;height:34px;background:#E2D8C8\"><\u002Fdiv>\n              <div style=\"min-width:150px\">\n                <div style=\"display:flex;justify-content:space-between;font-size:11px;font-weight:600;color:#8A8072;margin-bottom:6px\"><span>{{ doneCount }} of {{ total }} done<\u002Fspan><span>{{ pct }}%<\u002Fspan><\u002Fdiv>\n                <div style=\"height:7px;background:#E4DAC9;border-radius:999px;overflow:hidden\"><div style=\"height:100%;background:#4E8D5B;border-radius:999px;width:{{ pctW }}\"><\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ===== INTAKE ===== -->\n      <sc-if value=\"{{ isIntake }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"max-width:840px;margin:0 auto;padding:44px 30px 60px\">\n          <div style=\"font-size:11px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:#B0A492;margin-bottom:8px\">Step 1 · Event brief<\u002Fdiv>\n          <h1 style=\"margin:0 0 10px;font-family:'Newsreader',serif;font-weight:500;font-size:34px;letter-spacing:-.01em\">Start from the event brief<\u002Fh1>\n          <p style=\"margin:0 0 30px;font-size:15px;line-height:1.55;color:#6B6157;max-width:620px\">Upload the completed event proposal. Relay reads it, pulls out the key details, and builds a shared tracker — so LISA and Horizon work from one source of truth.<\u002Fp>\n\n          <!-- dropzone / file -->\n          <sc-if value=\"{{ notUploaded }}\" hint-placeholder-val=\"{{ true }}\">\n            <button onclick=\"{{ onUpload }}\" style=\"width:100%;border:2px dashed #D3C6B1;background:#FBF6EE;border-radius:16px;padding:44px;display:flex;flex-direction:column;align-items:center;gap:12px;cursor:pointer;transition:all .18s\" style-hover=\"border-color:#C0603A;background:#F7EFE4\">\n              <div style=\"width:52px;height:52px;border-radius:14px;background:#F5E0D6;display:flex;align-items:center;justify-content:center;color:#C0603A\"><svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4\"><\u002Fpath><polyline points=\"17 8 12 3 7 8\"><\u002Fpolyline><line x1=\"12\" y1=\"3\" x2=\"12\" y2=\"15\"><\u002Fline><\u002Fsvg><\u002Fdiv>\n              <div style=\"font-size:15px;font-weight:600;color:#2B2622\">Drop the event brief here, or click to upload<\u002Fdiv>\n              <div style=\"font-size:12.5px;color:#9A8F7E\">PDF, DOCX or a filled proposal form<\u002Fdiv>\n            <\u002Fbutton>\n          <\u002Fsc-if>\n\n          <sc-if value=\"{{ isUploaded }}\">\n            <div style=\"background:#FFFDF9;border:1px solid #E5DBCA;border-radius:16px;padding:18px 20px;display:flex;align-items:center;gap:14px;box-shadow:0 1px 3px rgba(0,0,0,.04)\">\n              <div style=\"width:44px;height:44px;border-radius:11px;background:#F5E0D6;display:flex;align-items:center;justify-content:center;color:#C0603A;flex:none\"><svg width=\"21\" height=\"21\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M14 3v4a1 1 0 0 0 1 1h4\"><\u002Fpath><path d=\"M5 21V5a2 2 0 0 1 2-2h7l5 5v13a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2z\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n              <div style=\"flex:1;min-width:0\">\n                <div style=\"font-size:14px;font-weight:600\">Hackathon_2026_Event_Brief.pdf<\u002Fdiv>\n                <div style=\"font-size:11.5px;color:#9A8F7E\">242 KB · uploaded by {{ me.name }}<\u002Fdiv>\n              <\u002Fdiv>\n              <sc-if value=\"{{ notExtracted }}\">\n                <button onclick=\"{{ onExtract }}\" style=\"background:#C0603A;color:#fff;border:none;border-radius:10px;padding:11px 18px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Hanken Grotesk',sans-serif;white-space:nowrap\" style-hover=\"background:#A44E2E\">Extract key details<\u002Fbutton>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ isExtracted }}\">\n                <span style=\"display:flex;align-items:center;gap:7px;color:#4E8D5B;font-size:13px;font-weight:600\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"20 6 9 17 4 12\"><\u002Fpolyline><\u002Fsvg>Details extracted<\u002Fspan>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <!-- extracted fields -->\n          <sc-if value=\"{{ isExtracted }}\">\n            <div style=\"margin-top:30px\">\n              <div style=\"display:flex;align-items:baseline;justify-content:space-between;margin-bottom:14px\">\n                <h2 style=\"margin:0;font-family:'Newsreader',serif;font-weight:500;font-size:21px\">Extracted from the brief<\u002Fh2>\n                <span style=\"font-size:12px;color:#9A8F7E;font-weight:500\">Review before generating<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:12px\">\n                <sc-for list=\"{{ fields }}\" as=\"f\" hint-placeholder-count=\"6\">\n                  <div style=\"background:#FFFDF9;border:1px solid #E9DFCE;border-radius:12px;padding:13px 15px;animation:riseIn .5s ease both;animation-delay:{{ f.delay }}\">\n                    <div style=\"font-size:10.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#B0A492;margin-bottom:5px\">{{ f.label }}<\u002Fdiv>\n                    <div style=\"font-size:13.5px;font-weight:600;color:#2B2622;line-height:1.35\">{{ f.value }}<\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n              <div style=\"margin-top:26px;display:flex;align-items:center;justify-content:space-between;background:#2B2622;border-radius:16px;padding:20px 24px;color:#F1EADE\">\n                <div>\n                  <div style=\"font-family:'Newsreader',serif;font-size:18px;margin-bottom:3px\">Ready to build the tracker<\u002Fdiv>\n                  <div style=\"font-size:12.5px;color:#C9BEAE\">16 tasks across 8 areas, with owners, effort estimates &amp; deadlines auto-set from the event date.<\u002Fdiv>\n                <\u002Fdiv>\n                <button onclick=\"{{ onGenerate }}\" style=\"background:#C0603A;color:#fff;border:none;border-radius:11px;padding:13px 22px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Hanken Grotesk',sans-serif;white-space:nowrap;display:flex;align-items:center;gap:9px\" style-hover=\"background:#D06A42\">Generate tracker <svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><line x1=\"5\" y1=\"12\" x2=\"19\" y2=\"12\"><\u002Fline><polyline points=\"12 5 19 12 12 19\"><\u002Fpolyline><\u002Fsvg><\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ===== EMPTY (not generated) ===== -->\n      <sc-if value=\"{{ showEmpty }}\">\n        <div style=\"max-width:520px;margin:100px auto 0;text-align:center;padding:0 30px\">\n          <div style=\"width:60px;height:60px;border-radius:16px;background:#F5EEE2;display:flex;align-items:center;justify-content:center;color:#C0AF97;margin:0 auto 18px\"><svg width=\"28\" height=\"28\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M14 3v4a1 1 0 0 0 1 1h4\"><\u002Fpath><path d=\"M5 21V5a2 2 0 0 1 2-2h7l5 5v13a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2z\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n          <h2 style=\"margin:0 0 8px;font-family:'Newsreader',serif;font-weight:500;font-size:23px\">No tracker yet<\u002Fh2>\n          <p style=\"margin:0 0 22px;font-size:14px;color:#6B6157;line-height:1.5\">Upload the event brief and Relay will generate the shared tracker for you.<\u002Fp>\n          <button onclick=\"{{ goIntake }}\" style=\"background:#C0603A;color:#fff;border:none;border-radius:10px;padding:12px 20px;font-size:13.5px;font-weight:600;cursor:pointer;font-family:'Hanken Grotesk',sans-serif\">Go to event brief<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ===== TRACKER / BOARD SECTIONS ===== -->\n      <sc-if value=\"{{ showSections }}\">\n        <div style=\"padding:20px 30px 60px\">\n\n          <!-- filters (tracker only) -->\n          <sc-if value=\"{{ isTracker }}\">\n            <div style=\"display:flex;flex-wrap:wrap;align-items:center;gap:18px;margin-bottom:22px\">\n              <div style=\"display:flex;align-items:center;gap:8px\">\n                <span style=\"font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#B0A492\">Person<\u002Fspan>\n                <div style=\"display:flex;gap:6px\">\n                  <sc-for list=\"{{ peopleChips }}\" as=\"c\" hint-placeholder-count=\"6\">\n                    <button onclick=\"{{ c.on }}\" style=\"{{ c.style }}\"><span style=\"{{ c.dotStyle }}\">{{ c.initials }}<\u002Fspan>{{ c.label }}<\u002Fbutton>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"width:1px;height:22px;background:#E2D8C8\"><\u002Fdiv>\n              <div style=\"display:flex;align-items:center;gap:8px\">\n                <span style=\"font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#B0A492\">Status<\u002Fspan>\n                <div style=\"display:flex;gap:6px\">\n                  <sc-for list=\"{{ statusChips }}\" as=\"c\" hint-placeholder-count=\"4\">\n                    <button onclick=\"{{ c.on }}\" style=\"{{ c.style }}\">{{ c.label }}<\u002Fbutton>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"width:1px;height:22px;background:#E2D8C8\"><\u002Fdiv>\n              <div style=\"display:flex;align-items:center;gap:8px\">\n                <span style=\"font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#B0A492\">Org<\u002Fspan>\n                <div style=\"display:flex;gap:6px\">\n                  <sc-for list=\"{{ orgChips }}\" as=\"c\" hint-placeholder-count=\"3\">\n                    <button onclick=\"{{ c.on }}\" style=\"{{ c.style }}\">{{ c.label }}<\u002Fbutton>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <!-- board intro -->\n          <sc-if value=\"{{ isBoard }}\">\n            <div style=\"margin-bottom:20px;font-size:13px;color:#6B6157\">Everything owned by <b style=\"color:{{ role.color }}\">{{ role.name }}<\u002Fb>, plus anything handed to or from <b>{{ other.name }}<\u002Fb>. Use <b>Hand off<\u002Fb> on any task to transfer it to the other team.<\u002Fdiv>\n          <\u002Fsc-if>\n\n          <!-- sections -->\n          <div style=\"display:flex;flex-direction:column;gap:26px\">\n            <sc-for list=\"{{ sections }}\" as=\"s\" hint-placeholder-count=\"4\">\n              <div>\n                <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:12px\">\n                  <span style=\"width:9px;height:9px;border-radius:3px;background:{{ s.accent }}\"><\u002Fspan>\n                  <h3 style=\"margin:0;font-size:14.5px;font-weight:700;letter-spacing:-.01em\">{{ s.title }}<\u002Fh3>\n                  <span style=\"font-size:11.5px;font-weight:700;color:#9A8F7E;background:#EAE0CF;border-radius:999px;padding:2px 8px\">{{ s.count }}<\u002Fspan>\n                  <span style=\"font-size:12px;color:#A99D8B\">{{ s.subtitle }}<\u002Fspan>\n                <\u002Fdiv>\n\n                <div style=\"display:flex;flex-direction:column;gap:9px\">\n                  <sc-for list=\"{{ s.tasks }}\" as=\"t\" hint-placeholder-count=\"3\">\n                    <div style=\"background:#FFFDF9;border:1px solid #E9DFCE;border-left:3px solid {{ t.ownerColor }};border-radius:12px;box-shadow:0 1px 2px rgba(0,0,0,.03)\">\n                      <div style=\"display:flex;align-items:center;gap:14px;padding:13px 16px\">\n                        <!-- status toggle -->\n                        <button onclick=\"{{ t.onCycle }}\" title=\"Click to change status\" style=\"flex:none;display:flex;align-items:center;gap:8px;background:{{ t.statusBg }};border:1px solid {{ t.statusBorder }};border-radius:999px;padding:5px 11px 5px 9px;cursor:pointer;font-family:'Hanken Grotesk',sans-serif\">\n                          <span style=\"width:9px;height:9px;border-radius:50%;background:{{ t.statusColor }}\"><\u002Fspan>\n                          <span style=\"font-size:11.5px;font-weight:700;color:{{ t.statusColor }};white-space:nowrap\">{{ t.statusLabel }}<\u002Fspan>\n                        <\u002Fbutton>\n                        <!-- title + meta -->\n                        <div style=\"flex:1;min-width:0\">\n                          <div style=\"display:flex;align-items:center;gap:9px;flex-wrap:wrap\">\n                            <span style=\"font-size:14px;font-weight:600;color:#2B2622\">{{ t.title }}<\u002Fspan>\n                            <sc-if value=\"{{ t.received }}\"><span style=\"font-size:10px;font-weight:700;color:#7A6BB0;background:#EEEAF6;border:1px solid #DAD1EE;border-radius:999px;padding:2px 8px;display:inline-flex;align-items:center;gap:4px\">↓ {{ t.received }}<\u002Fspan><\u002Fsc-if>\n                            <sc-if value=\"{{ t.waiting }}\"><span style=\"font-size:10px;font-weight:700;color:#8A8072;background:#F0E9DB;border:1px solid #E2D8C8;border-radius:999px;padding:2px 8px;display:inline-flex;align-items:center;gap:4px\">↑ {{ t.waiting }}<\u002Fspan><\u002Fsc-if>\n                          <\u002Fdiv>\n                          <div style=\"display:flex;align-items:center;gap:12px;margin-top:5px\">\n                            <span style=\"display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;color:{{ t.catColor }}\"><span style=\"width:6px;height:6px;border-radius:50%;background:{{ t.catColor }}\"><\u002Fspan>{{ t.catName }}<\u002Fspan>\n                            <span style=\"display:inline-flex;align-items:center;gap:4px;font-size:11px;color:#9A8F7E;font-weight:500\"><svg width=\"12\" height=\"12\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><polyline points=\"12 7 12 12 15 14\"><\u002Fpolyline><\u002Fsvg>{{ t.effortLabel }}<\u002Fspan>\n                            <button onclick=\"{{ t.onToggle }}\" style=\"background:none;border:none;padding:0;font-size:11px;color:#B08A5E;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:3px;font-family:'Hanken Grotesk',sans-serif\">Context <span style=\"font-size:9px\">{{ t.chevron }}<\u002Fspan><\u002Fbutton>\n                          <\u002Fdiv>\n                        <\u002Fdiv>\n                        <!-- due -->\n                        <div style=\"flex:none;text-align:right\">\n                          <div style=\"font-size:13px;font-weight:700;color:{{ t.dueColor }}\">{{ t.dueLabel }}<\u002Fdiv>\n                          <div style=\"font-size:10.5px;font-weight:600;color:{{ t.dueColor }};opacity:.85\">{{ t.dueRelLabel }}<\u002Fdiv>\n                        <\u002Fdiv>\n                        <!-- assignee -->\n                        <div style=\"flex:none;display:flex;align-items:center;gap:7px;min-width:132px\">\n                          <div style=\"width:26px;height:26px;border-radius:50%;background:{{ t.assigneeColor }};display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:9.5px;flex:none\">{{ t.assigneeInitials }}<\u002Fdiv>\n                          <select value=\"{{ t.assigneeId }}\" onchange=\"{{ t.onAssign }}\" style=\"flex:1;min-width:0;font-size:11.5px;font-weight:600;color:#5A5148;background:#F5EEE2;border:1px solid #E5DBCA;border-radius:8px;padding:5px 6px;cursor:pointer\">\n                            <option value=\"\">Unassigned<\u002Foption>\n                            <sc-for list=\"{{ t.assignOptions }}\" as=\"o\" hint-placeholder-count=\"2\">\n                              <option value=\"{{ o.id }}\">{{ o.name }}<\u002Foption>\n                            <\u002Fsc-for>\n                          <\u002Fselect>\n                        <\u002Fdiv>\n                        <!-- handoff -->\n                        <sc-if value=\"{{ t.canHandoff }}\">\n                          <button onclick=\"{{ t.onHandoff }}\" title=\"{{ t.handoffLabel }}\" style=\"flex:none;display:flex;align-items:center;gap:6px;background:#FFFDF9;border:1px solid #E2D8C8;border-radius:9px;padding:7px 11px;font-size:11.5px;font-weight:600;color:#7A6BB0;cursor:pointer;font-family:'Hanken Grotesk',sans-serif;white-space:nowrap\" style-hover=\"border-color:#7A6BB0;background:#F6F3FB\">\n                            <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><line x1=\"5\" y1=\"12\" x2=\"19\" y2=\"12\"><\u002Fline><polyline points=\"12 5 19 12 12 19\"><\u002Fpolyline><\u002Fsvg>{{ t.handoffShort }}\n                          <\u002Fbutton>\n                        <\u002Fsc-if>\n                      <\u002Fdiv>\n                      <!-- context -->\n                      <sc-if value=\"{{ t.expanded }}\">\n                        <div style=\"padding:0 16px 14px 16px;animation:pop .2s ease both\">\n                          <div style=\"background:#F7F0E4;border:1px solid #EADFCC;border-radius:10px;padding:12px 14px;display:flex;gap:10px\">\n                            <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#B08A5E\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"flex:none;margin-top:1px\"><circle cx=\"12\" cy=\"12\" r=\"10\"><\u002Fcircle><line x1=\"12\" y1=\"16\" x2=\"12\" y2=\"12\"><\u002Fline><line x1=\"12\" y1=\"8\" x2=\"12.01\" y2=\"8\"><\u002Fline><\u002Fsvg>\n                            <div><span style=\"font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#B08A5E\">From the brief · <\u002Fspan><span style=\"font-size:12.5px;color:#6B5D48;line-height:1.5\">{{ t.contextText }}<\u002Fspan><\u002Fdiv>\n                          <\u002Fdiv>\n                        <\u002Fdiv>\n                      <\u002Fsc-if>\n                    <\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n\n          <sc-if value=\"{{ noResults }}\">\n            <div style=\"text-align:center;padding:60px 0;color:#A99D8B;font-size:14px\">No tasks match these filters.<\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ===== TIMELINE ===== -->\n      <sc-if value=\"{{ showTimeline }}\">\n        <div style=\"padding:24px 30px 60px;max-width:900px\">\n          <div style=\"margin-bottom:22px;font-size:13px;color:#6B6157\">Deadlines are set automatically from the event date minus each task's lead time. Days with a heavy load are flagged so slots don't clash.<\u002Fdiv>\n          <div style=\"position:relative;padding-left:8px\">\n            <sc-for list=\"{{ timeline }}\" as=\"g\" hint-placeholder-count=\"6\">\n              <div style=\"display:flex;gap:20px;padding-bottom:22px;position:relative\">\n                <div style=\"position:absolute;left:73px;top:24px;bottom:-4px;width:2px;background:#E2D8C8\"><\u002Fdiv>\n                <div style=\"flex:none;width:66px;text-align:right;padding-top:2px\">\n                  <div style=\"font-size:14px;font-weight:700;font-family:'Newsreader',serif;color:#2B2622\">{{ g.dateLabel }}<\u002Fdiv>\n                  <div style=\"font-size:10.5px;color:#9A8F7E;font-weight:600\">{{ g.dow }}<\u002Fdiv>\n                  <div style=\"font-size:10px;color:#B0A492;margin-top:2px\">{{ g.relLabel }}<\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"flex:none;width:14px;display:flex;justify-content:center;padding-top:5px;z-index:1\"><span style=\"{{ g.dotStyle }}\"><\u002Fspan><\u002Fdiv>\n                <div style=\"flex:1;padding-top:1px\">\n                  <sc-if value=\"{{ g.busy }}\"><div style=\"font-size:10.5px;font-weight:700;color:#B0553F;background:#F6E2DC;border:1px solid #EDCBC0;border-radius:8px;padding:4px 9px;display:inline-flex;align-items:center;gap:6px;margin-bottom:8px\">⚠ Heavy day — {{ g.count }} tasks due<\u002Fdiv><\u002Fsc-if>\n                  <div style=\"display:flex;flex-direction:column;gap:7px\">\n                    <sc-for list=\"{{ g.items }}\" as=\"it\" hint-placeholder-count=\"2\">\n                      <div style=\"display:flex;align-items:center;gap:10px;background:#FFFDF9;border:1px solid #E9DFCE;border-left:3px solid {{ it.ownerColor }};border-radius:10px;padding:9px 13px\">\n                        <span style=\"width:7px;height:7px;border-radius:50%;background:{{ it.catColor }};flex:none\"><\u002Fspan>\n                        <span style=\"flex:1;font-size:13px;font-weight:600;color:{{ it.titleColor }};text-decoration:{{ it.strike }}\">{{ it.title }}<\u002Fspan>\n                        <span style=\"font-size:10.5px;font-weight:700;color:{{ it.ownerColor }};background:{{ it.ownerBg }};border-radius:999px;padding:2px 9px\">{{ it.ownerName }}<\u002Fspan>\n                      <\u002Fdiv>\n                    <\u002Fsc-for>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n    <\u002Fmain>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:&quot;100%&quot;}}\">\nclass Component extends DCLogic {\n  state = {\n    role: 'LISA', view: 'intake',\n    uploaded: false, extracted: false, generated: false,\n    tasks: [], expanded: {},\n    fAssignee: 'all', fStatus: 'all', fOrg: 'all',\n  };\n\n  MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];\n  DOW = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];\n  TODAY = '2026-07-20';\n  EVENT = { name:'AI Safety Hackathon 2026', type:'Hackathon', dateISO:'2026-09-12',\n            dateLabel:'Sat 12 Sep 2026', headcount:80, venue:'Main hall + 3 breakouts' };\n\n  ORGS = {\n    LISA:    { id:'LISA',    name:'LISA',    color:'#C0603A' },\n    PARTNER: { id:'PARTNER', name:'Horizon', color:'#3F8A72' },\n  };\n\n  PEOPLE = [\n    { id:'priya', name:'Priya Nair',  first:'Priya', role:'Events Lead',        org:'LISA',    initials:'PN', color:'#C0603A' },\n    { id:'tom',   name:'Tom Okafor',  first:'Tom',   role:'Ops & Facilities',   org:'LISA',    initials:'TO', color:'#B0553F' },\n    { id:'yuki',  name:'Yuki Tanaka', first:'Yuki',  role:'Comms & Marketing',  org:'LISA',    initials:'YT', color:'#9A5B7A' },\n    { id:'sam',   name:'Sam Ellis',   first:'Sam',   role:'Event Owner',        org:'PARTNER', initials:'SE', color:'#3F8A72' },\n    { id:'lena',  name:'Lena Vogt',   first:'Lena',  role:'Programme',          org:'PARTNER', initials:'LV', color:'#6F8F4E' },\n  ];\n\n  CATS = {\n    speaker:      { name:'Speaker comms & travel',   color:'#B4622F' },\n    room:         { name:'Room booking & setup',     color:'#7A6BB0' },\n    av:           { name:'AV / tech',                color:'#4E7FA8' },\n    catering:     { name:'Catering & refreshments',  color:'#C58A2E' },\n    registration: { name:'Registration & headcount', color:'#6F8F4E' },\n    budget:       { name:'Budget & finance',         color:'#3F8A72' },\n    marketing:    { name:'Marketing & promotion',    color:'#B0553F' },\n    access:       { name:'Visitor access / security',color:'#9A5B7A' },\n  };\n  CAT_ORDER = ['speaker','registration','marketing','room','av','catering','budget','access'];\n\n  STATUSES = {\n    todo:   { label:'To do',       color:'#9A8F7E', bg:'#F0E9DB', border:'#E2D8C8' },\n    active: { label:'In progress', color:'#B07A1E', bg:'#F7ECD4', border:'#EBD9B4' },\n    done:   { label:'Done',        color:'#4E8D5B', bg:'#E7F0E7', border:'#CFE3CF' },\n  };\n\n  FIELDS = [\n    ['Event type','Hackathon'],['Date','Sat 12 Sep 2026'],['Speaker','Keynote — AI safety (TBC)'],\n    ['Expected headcount','80 attendees'],['Space needed','Main hall + 3 breakout rooms'],['Budget','£6,500'],\n    ['Funding source','Horizon AI Safety Society grant'],['Catering','Lunch + snacks, dietary options'],\n    ['Target market','Early-career researchers & students'],['AV needs','Projector, mics, livestream'],\n    ['Organisers','Sam Ellis (Horizon) · Priya Nair (LISA)'],['Success metrics','60+ attendees · 12 submissions'],\n    ['Purpose','Build AI-safety tooling; grow community'],['Support from LISA','Venue, AV, access, staffing'],\n  ];\n\n  seed() {\n    const t = (id,cat,title,owner,assignee,effortH,leadDays,status,context,handedBy) =>\n      ({ id, cat, title, owner, assignee, effortH, leadDays, status, context, handedBy: handedBy||null });\n    return [\n      t('t1','speaker','Confirm keynote speaker','PARTNER','sam',2,45,'active','Purpose: build AI-safety tooling — a strong keynote anchors the programme.'),\n      t('t2','speaker','Book speaker travel & accommodation','PARTNER','lena',3,30,'todo','Budget £6,500 includes speaker travel & one night\\u2019s stay.'),\n      t('t3','registration','Set up registration page','PARTNER','sam',2,40,'active','Target market: early-career researchers & students. Cap registrations at venue capacity.'),\n      t('t4','registration','Send reminder to registrants','PARTNER','lena',0.5,3,'todo','Success metric: 60+ attendees from ~80 registrations.'),\n      t('t5','marketing','Design & publish event page','PARTNER','lena',3,35,'active','Target market: students & early-career researchers across partner networks.'),\n      t('t6','marketing','Run social media campaign','PARTNER','lena',2,21,'todo','Success metric: reach + 12 project submissions on the day.'),\n      t('t7','room','Reserve main hall + 3 breakout rooms','LISA','tom',1,40,'done','Space needed: main hall + 3 breakout rooms for 80 people.'),\n      t('t8','room','Plan room layout & signage','LISA','tom',2,5,'todo','80 attendees, hackathon team tables plus breakout spaces.'),\n      t('t9','av','Set up projector, mics & livestream','LISA','yuki',3,2,'todo','AV needs: projector, mics, livestream for remote viewers.'),\n      t('t10','av','Test livestream end-to-end','LISA','yuki',1,1,'todo','Livestream is a stated success metric — full dry-run required.'),\n      t('t11','catering','Book lunch caterer (dietary options)','PARTNER','lena',2,14,'todo','Catering: lunch + snacks with dietary options for 80.'),\n      t('t12','catering','Confirm final headcount to caterer','PARTNER',null,0.5,3,'todo','Waiting on final registration numbers before confirming quantities.'),\n      t('t13','budget','Confirm grant funding release','PARTNER','sam',1,30,'done','Funding: Horizon AI Safety Society grant, £6,500.'),\n      t('t14','budget','Reconcile expenses post-event','LISA','priya',2,-3,'todo','Finance sign-off shared between LISA & Horizon after the event.'),\n      t('t15','access','Register visitor list with reception','LISA','tom',1,5,'todo','80 external visitors need building access on the day. List compiled by Horizon.','PARTNER'),\n      t('t16','access','Brief front-desk staff','LISA','tom',0.5,1,'todo','Front desk manages check-in and badges for external visitors.'),\n    ];\n  }\n\n  // ---- date helpers ----\n  dt(iso){ const [y,m,d]=iso.split('-').map(Number); return new Date(y,m-1,d); }\n  dueOf(leadDays){ const e=this.dt(this.EVENT.dateISO); e.setDate(e.getDate()-leadDays); return e; }\n  fmt(d){ return this.MONTHS[d.getMonth()]+' '+d.getDate(); }\n  daysBetween(a,b){ return Math.round((b-a)/86400000); }\n\n  // ---- actions ----\n  setView(v){ this.setState({ view:v }); }\n  setRole(r){ this.setState({ role:r }); }\n  upload(){ this.setState({ uploaded:true }); }\n  extract(){ this.setState({ extracted:true }); }\n  generate(){ this.setState({ generated:true, tasks:this.seed(), view:'tracker' }); }\n  cycleStatus(id){\n    const order={todo:'active',active:'done',done:'todo'};\n    this.setState(s=>({ tasks:s.tasks.map(t=>t.id===id?{...t,status:order[t.status]}:t) }));\n  }\n  handOff(id){\n    this.setState(s=>({ tasks:s.tasks.map(t=>{\n      if(t.id!==id) return t;\n      const to = t.owner==='LISA' ? 'PARTNER' : 'LISA';\n      return { ...t, owner:to, handedBy:t.owner, assignee:null, status:'todo' };\n    }) }));\n  }\n  assign(id,val){\n    this.setState(s=>({ tasks:s.tasks.map(t=>t.id===id?{...t,assignee:val||null}:t) }));\n  }\n  toggleCtx(id){\n    this.setState(s=>({ expanded:{...s.expanded,[id]:!s.expanded[id]} }));\n  }\n\n  chip(active){\n    return `display:inline-flex;align-items:center;gap:6px;padding:6px 11px;border-radius:999px;font:600 12px/1 'Hanken Grotesk',sans-serif;cursor:pointer;transition:all .14s;white-space:nowrap;border:1px solid ${active?'#2B2622':'#E2D8C8'};background:${active?'#2B2622':'#FFFDF9'};color:${active?'#F6F1E9':'#5A5148'}`;\n  }\n  navStyle(active){\n    return `display:flex;align-items:center;gap:11px;width:100%;text-align:left;padding:9px 11px;border-radius:10px;border:none;cursor:pointer;font:600 13.5px/1 'Hanken Grotesk',sans-serif;transition:all .14s;background:${active?'#C0603A':'transparent'};color:${active?'#fff':'#6B6157'}`;\n  }\n  countBadge(active){\n    return `margin-left:auto;font-size:11px;font-weight:700;border-radius:999px;padding:1px 7px;background:${active?'rgba(255,255,255,.25)':'#EAE0CF'};color:${active?'#fff':'#9A8F7E'}`;\n  }\n  roleChip(active,color){\n    return `padding:7px 14px;border-radius:8px;border:none;cursor:pointer;font:600 12.5px/1 'Hanken Grotesk',sans-serif;transition:all .14s;background:${active?'#FFFDF9':'transparent'};color:${active?color:'#8A8072'};box-shadow:${active?'0 1px 3px rgba(0,0,0,.12)':'none'}`;\n  }\n\n  card(task, viewerId){\n    const S=this.state;\n    const cat=this.CATS[task.cat];\n    const ownerOrg=this.ORGS[task.owner];\n    const st=this.STATUSES[task.status];\n    const today=this.dt(this.TODAY);\n    const due=this.dueOf(task.leadDays);\n    const dLeft=this.daysBetween(today,due);\n    let dueColor='#8A8072';\n    if(task.status==='done') dueColor='#4E8D5B';\n    else if(dLeft<0) dueColor='#B0553F';\n    else if(dLeft<=7) dueColor='#B07A1E';\n    const p = task.assignee ? this.PEOPLE.find(x=>x.id===task.assignee) : null;\n    const assignOptions = this.PEOPLE.filter(x=>x.org===task.owner).map(x=>({id:x.id,name:x.first}));\n    const effortLabel = task.effortH<1 ? Math.round(task.effortH*60)+' min'\n      : (task.effortH===1?'1 hr':task.effortH+' hrs');\n    const otherOf = task.owner==='LISA'?'PARTNER':'LISA';\n    const received = (task.owner===viewerId && task.handedBy && task.handedBy!==viewerId && task.status!=='done')\n      ? 'From '+this.ORGS[task.handedBy].name : null;\n    const waiting = (task.owner!==viewerId && task.handedBy===viewerId && task.status!=='done')\n      ? 'With '+this.ORGS[task.owner].name : null;\n    const relLabel = task.status==='done' ? 'complete'\n      : (dLeft<0 ? Math.abs(dLeft)+'d overdue' : (dLeft===0?'due today':'in '+dLeft+'d'));\n    return {\n      id:task.id, title:task.title,\n      catName:cat.name, catColor:cat.color,\n      ownerColor:ownerOrg.color,\n      statusLabel:st.label, statusColor:st.color, statusBg:st.bg, statusBorder:st.border,\n      effortLabel,\n      dueLabel:this.fmt(due), dueColor, dueRelLabel:relLabel,\n      assigneeInitials:p?p.initials:'—', assigneeColor:p?p.color:'#C9BEAE', assigneeId:task.assignee||'',\n      assignOptions,\n      contextText:task.context, expanded:!!S.expanded[task.id], chevron:S.expanded[task.id]?'▲':'▼',\n      received, waiting,\n      canHandoff: task.status!=='done',\n      handoffLabel:'Hand off to '+this.ORGS[otherOf].name,\n      handoffShort:'→ '+this.ORGS[otherOf].name,\n      onCycle:()=>this.cycleStatus(task.id),\n      onHandoff:()=>this.handOff(task.id),\n      onToggle:()=>this.toggleCtx(task.id),\n      onAssign:(e)=>this.assign(task.id,e.target.value),\n    };\n  }\n\n  renderVals(){\n    const S=this.state;\n    const roleId=S.role, otherId= roleId==='LISA'?'PARTNER':'LISA';\n    const role=this.ORGS[roleId], other=this.ORGS[otherId];\n    const me=this.PEOPLE.find(p=>p.org===roleId);\n    const today=this.dt(this.TODAY), eventDate=this.dt(this.EVENT.dateISO);\n    const daysToEvent=this.daysBetween(today,eventDate);\n    const tasks=S.tasks;\n\n    const total=tasks.length;\n    const doneCount=tasks.filter(t=>t.status==='done').length;\n    const pct= total? Math.round(doneCount/total*100):0;\n    const openTotal=total-doneCount;\n    const myOpen=tasks.filter(t=>t.owner===roleId && t.status!=='done');\n\n    // filters\n    const pass=(t)=>{\n      if(S.fOrg!=='all' && t.owner!==S.fOrg) return false;\n      if(S.fStatus!=='all' && t.status!==S.fStatus) return false;\n      if(S.fAssignee!=='all' && t.assignee!==S.fAssignee) return false;\n      return true;\n    };\n\n    // sections\n    let sections=[];\n    if(S.view==='tracker'){\n      sections=this.CAT_ORDER.map(cid=>{\n        const ct=this.CATS[cid];\n        const list=tasks.filter(t=>t.cat===cid && pass(t)).map(t=>this.card(t,roleId));\n        return { key:cid, title:ct.name, accent:ct.color, count:list.length, subtitle:'', tasks:list };\n      }).filter(s=>s.count>0);\n    } else if(S.view==='board'){\n      const mine=tasks.filter(t=>t.owner===roleId);\n      const received=mine.filter(t=>t.handedBy===otherId && t.status!=='done');\n      const rec=new Set(received.map(t=>t.id));\n      const open=mine.filter(t=>t.status!=='done' && !rec.has(t.id));\n      const doneL=mine.filter(t=>t.status==='done');\n      const waiting=tasks.filter(t=>t.owner===otherId && t.handedBy===roleId && t.status!=='done');\n      sections=[\n        { key:'rec', title:'Handed to you — action needed', accent:'#7A6BB0', subtitle:'passed over by '+other.name, tasks:received.map(t=>this.card(t,roleId)) },\n        { key:'open', title:'Your open tasks', accent:role.color, subtitle:'owned by '+role.name, tasks:open.map(t=>this.card(t,roleId)) },\n        { key:'wait', title:'Waiting on '+other.name, accent:'#9A8F7E', subtitle:'you handed these over', tasks:waiting.map(t=>this.card(t,roleId)) },\n        { key:'done', title:'Completed', accent:'#4E8D5B', subtitle:'', tasks:doneL.map(t=>this.card(t,roleId)) },\n      ].map(s=>({...s,count:s.tasks.length})).filter(s=>s.count>0);\n    }\n\n    // timeline\n    let timeline=[];\n    if(S.view==='timeline'){\n      const wd=tasks.map(t=>({t,due:this.dueOf(t.leadDays)})).sort((a,b)=>a.due-b.due);\n      const map={}, order=[];\n      wd.forEach(({t,due})=>{ const k=due.toDateString(); if(!map[k]){map[k]={date:due,items:[]};order.push(k);} map[k].items.push(t); });\n      timeline=order.map(k=>{\n        const g=map[k]; const dLeft=this.daysBetween(today,g.date); const busy=g.items.length>=3;\n        return {\n          key:k, dateLabel:this.fmt(g.date), dow:this.DOW[g.date.getDay()],\n          count:g.items.length, busy,\n          relLabel: dLeft<0?Math.abs(dLeft)+'d ago':(dLeft===0?'today':'in '+dLeft+'d'),\n          dotStyle:`width:12px;height:12px;border-radius:50%;background:${busy?'#B0553F':'#C0603A'};border:3px solid #F1EADE;box-shadow:0 0 0 1px ${busy?'#B0553F':'#C0603A'}`,\n          items:g.items.map(t=>{\n            const o=this.ORGS[t.owner]; const done=t.status==='done';\n            return { title:t.title, catColor:this.CATS[t.cat].color, ownerColor:o.color, ownerName:o.name,\n              ownerBg: t.owner==='LISA'?'#F5E0D6':'#E1EFE9',\n              titleColor: done?'#A99D8B':'#2B2622', strike: done?'line-through':'none' };\n          })\n        };\n      });\n    }\n\n    const noResults = (S.view==='tracker' || S.view==='board') && sections.length===0;\n\n    // chips\n    const peopleChips=[{id:'all',label:'Everyone',initials:'•',color:'#8A8072'}]\n      .concat(this.PEOPLE.map(p=>({id:p.id,label:p.first,initials:p.initials,color:p.color})))\n      .map(c=>({ ...c, on:()=>this.setState({fAssignee:c.id}),\n        style:this.chip(S.fAssignee===c.id),\n        dotStyle:`width:17px;height:17px;border-radius:50%;background:${c.color};display:inline-flex;align-items:center;justify-content:center;color:#fff;font-size:8px;font-weight:700` }));\n    const statusChips=[['all','All'],['todo','To do'],['active','In progress'],['done','Done']]\n      .map(([id,label])=>({ id,label, on:()=>this.setState({fStatus:id}), style:this.chip(S.fStatus===id) }));\n    const orgChips=[['all','Both orgs'],['LISA','LISA'],['PARTNER','Horizon']]\n      .map(([id,label])=>({ id,label, on:()=>this.setState({fOrg:id}), style:this.chip(S.fOrg===id) }));\n\n    const team=this.PEOPLE.map(p=>({ name:p.name, initials:p.initials, color:p.color, tag:this.ORGS[p.org].name+' · '+p.role }));\n\n    return {\n      me:{ name:me.name, role:me.role, initials:me.initials, color:me.color },\n      role, other,\n      event:this.EVENT, daysToEvent, doneCount, total, pct, pctW:pct+'%',\n      openTotal, myOpenCount:myOpen.length,\n      team,\n\n      // nav\n      goIntake:()=>this.setView('intake'),\n      goTracker:()=>this.setView('tracker'),\n      goBoard:()=>this.setView('board'),\n      goTimeline:()=>this.setView('timeline'),\n      navIntake:this.navStyle(S.view==='intake'),\n      navTracker:this.navStyle(S.view==='tracker'),\n      navBoard:this.navStyle(S.view==='board'),\n      navTimeline:this.navStyle(S.view==='timeline'),\n      trackerCountStyle:this.countBadge(S.view==='tracker'),\n      boardCountStyle:this.countBadge(S.view==='board'),\n\n      // role switch\n      roleLISA:()=>this.setRole('LISA'),\n      rolePartner:()=>this.setRole('PARTNER'),\n      roleChipLISA:this.roleChip(roleId==='LISA', this.ORGS.LISA.color),\n      roleChipPartner:this.roleChip(roleId==='PARTNER', this.ORGS.PARTNER.color),\n\n      // view flags\n      isIntake:S.view==='intake',\n      showContextHeader: S.generated && S.view!=='intake',\n      showEmpty: !S.generated && S.view!=='intake',\n      showSections: S.generated && (S.view==='tracker'||S.view==='board'),\n      showTimeline: S.generated && S.view==='timeline',\n      isTracker:S.view==='tracker', isBoard:S.view==='board',\n      noResults,\n\n      // intake\n      notUploaded:!S.uploaded, isUploaded:S.uploaded,\n      notExtracted:!S.extracted, isExtracted:S.extracted,\n      onUpload:()=>this.upload(), onExtract:()=>this.extract(), onGenerate:()=>this.generate(),\n      fields:this.FIELDS.map(([label,value],i)=>({label,value,delay:(i*0.05).toFixed(2)+'s'})),\n\n      sections, timeline,\n      peopleChips, statusChips, orgChips,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
